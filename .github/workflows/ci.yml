name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.5"

      - name: Run unit tests
        run: go test ./...

      - name: Build container image
        run: docker build -t devops-project:ci .

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          ignore-unfixed: true
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: devops-project:ci
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: "1"
