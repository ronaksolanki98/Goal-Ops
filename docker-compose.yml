services:
  postgres:
    image: postgres:16-alpine
    container_name: devops-project-postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ops/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops-project-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_USERNAME: myuser
      DB_PASSWORD: mypassword
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: mydb
      SSL: disable
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: devops-project-prometheus
    depends_on:
      - app
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.0
    container_name: devops-project-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"

volumes:
  postgres_data:
